<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List | Anas Khan</title>
  <meta name="description" content="A state-driven to-do list app with local storage persistence, built by Anas Khan.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-bg: #0F1626;
      --color-bg-soft: #161F35;
      --color-gold: #C9A24B;
      --color-text: #EDE7DA;
      --color-text-muted: #A8AEC0;
      --color-done: #6B8F71;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: var(--color-bg); color: var(--color-text);
      font-family: var(--font-body); line-height: 1.5;
      display: flex; justify-content: center; padding: 2em 1em;
    }
    main {
      width: 100%; max-width: 480px;
    }
    h1 {
      font-family: var(--font-display); text-align: center; margin-bottom: 0.2em;
    }
    p.subtitle { text-align: center; color: var(--color-text-muted); margin-top: 0; font-size: 0.9em; }

    form#todo-form {
      display: flex; gap: 0.5em; margin: 1.5em 0;
    }
    #todo-input {
      flex: 1; padding: 0.7em; border-radius: 6px; border: 1px solid rgba(201,162,75,0.3);
      background: var(--color-bg-soft); color: var(--color-text); font-family: var(--font-body); font-size: 1em;
    }
    #todo-form button {
      background: var(--color-gold); color: #0F1626; border: none;
      padding: 0.7em 1.2em; border-radius: 6px; font-weight: 600; cursor: pointer;
    }
    #todo-input:focus, #todo-form button:focus, .filter-btn:focus {
      outline: 3px solid var(--color-gold); outline-offset: 2px;
    }

    .filters {
      display: flex; gap: 0.5em; justify-content: center; margin-bottom: 1.25em;
    }
    .filter-btn {
      background: transparent; border: 1px solid rgba(201,162,75,0.4); color: var(--color-text-muted);
      padding: 0.4em 1em; border-radius: 999px; cursor: pointer; font-size: 0.85em;
    }
    .filter-btn[aria-pressed="true"] {
      background: var(--color-gold); color: #0F1626; border-color: var(--color-gold);
    }

    ul#todo-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.6em; }
    .todo-item {
      display: flex; align-items: center; gap: 0.75em;
      background: var(--color-bg-soft); border: 1px solid rgba(201,162,75,0.2);
      border-radius: 8px; padding: 0.75em 1em;
    }
    .todo-item.completed .todo-text { text-decoration: line-through; color: var(--color-text-muted); }
    .todo-text { flex: 1; word-break: break-word; }
    .todo-item button {
      background: transparent; border: none; color: var(--color-text-muted); cursor: pointer; font-size: 1.1em;
      padding: 0.25em;
    }
    .todo-item button.delete-btn:hover { color: #C97D75; }
    .todo-item input[type="checkbox"] { width: 1.2em; height: 1.2em; accent-color: var(--color-done); cursor: pointer; }

    .empty-state { text-align: center; color: var(--color-text-muted); margin-top: 2em; font-size: 0.9em; }
    .count { text-align: center; color: var(--color-text-muted); font-size: 0.85em; margin-top: 1.5em; }
  </style>
</head>
<body>
  <main>
    <h1>My To-Do List</h1>
    <p class="subtitle">Tasks are saved automatically in this browser.</p>

    <form id="todo-form" aria-label="Add a new task">
      <label for="todo-input" class="visually-hidden">New task</label>
      <input type="text" id="todo-input" placeholder="What do you need to do?" autocomplete="off" required>
      <button type="submit">Add</button>
    </form>

    <div class="filters" role="group" aria-label="Filter tasks">
      <button class="filter-btn" data-filter="all" aria-pressed="true">All</button>
      <button class="filter-btn" data-filter="active" aria-pressed="false">Active</button>
      <button class="filter-btn" data-filter="completed" aria-pressed="false">Completed</button>
    </div>

    <ul id="todo-list" aria-live="polite"></ul>
    <p class="empty-state" id="empty-state" hidden>No tasks here yet.</p>
    <p class="count" id="task-count"></p>
  </main>

  <script>
    const STORAGE_KEY = 'anas-todo-items';
    let todos = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentFilter = 'all';

    const listEl = document.getElementById('todo-list');
    const formEl = document.getElementById('todo-form');
    const inputEl = document.getElementById('todo-input');
    const emptyEl = document.getElementById('empty-state');
    const countEl = document.getElementById('task-count');
    const filterBtns = document.querySelectorAll('.filter-btn');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function getFiltered() {
      if (currentFilter === 'active') return todos.filter(t => !t.completed);
      if (currentFilter === 'completed') return todos.filter(t => t.completed);
      return todos;
    }

    function render() {
      const filtered = getFiltered();
      listEl.innerHTML = '';

      filtered.forEach(todo => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (todo.completed ? ' completed' : '');
        li.dataset.id = todo.id;

        li.innerHTML = `
          <input type="checkbox" ${todo.completed ? 'checked' : ''} aria-label="Mark '${todo.text}' as complete">
          <span class="todo-text">${todo.text}</span>
          <button class="delete-btn" aria-label="Delete '${todo.text}'">✕</button>
        `;
        listEl.appendChild(li);
      });

      emptyEl.hidden = filtered.length !== 0;
      const activeCount = todos.filter(t => !t.completed).length;
      countEl.textContent = todos.length
        ? `${activeCount} active / ${todos.length} total`
        : '';
    }

    formEl.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;
      todos.push({ id: Date.now().toString(), text, completed: false });
      inputEl.value = '';
      save();
      render();
    });

    // Event delegation for checkbox toggle + delete
    listEl.addEventListener('click', (e) => {
      const li = e.target.closest('.todo-item');
      if (!li) return;
      const id = li.dataset.id;

      if (e.target.matches('input[type="checkbox"]')) {
        todos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
        save();
        render();
      }

      if (e.target.matches('.delete-btn')) {
        todos = todos.filter(t => t.id !== id);
        save();
        render();
      }
    });

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        filterBtns.forEach(b => b.setAttribute('aria-pressed', b === btn ? 'true' : 'false'));
        render();
      });
    });

    render();
  </script>
</body>
</html>
